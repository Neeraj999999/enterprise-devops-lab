trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  imageName: enterprise-devops-lab
  imageTag: $(Build.BuildId)
  acrName: acrnmdevopslab01
  acrServiceConnection: acr-enterprise
  azureServiceConnection: azure-rm-enterprise
  resourceGroup: rg-enterprise-lab
  aksCluster: aks-enterprise
  namespace: petclinic

stages:

- stage: Build
  displayName: Build and Push Container

  jobs:

  - job: Build
    displayName: Build Spring Boot Application

    steps:

    - checkout: self

    - task: JavaToolInstaller@0
      displayName: Install Java 21
      inputs:
        versionSpec: '21'
        jdkArchitectureOption: x64
        jdkSourceOption: PreInstalled

    - script: |
        cd app
        mvn clean package -DskipTests
      displayName: Build Spring Boot Application

    - task: PublishPipelineArtifact@1
      displayName: Publish JAR
      inputs:
        targetPath: '$(Build.SourcesDirectory)/app/target'
        artifact: springboot-jar

    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        command: buildAndPush
        containerRegistry: $(acrServiceConnection)
        repository: $(imageName)
        Dockerfile: 'app/Dockerfile'
        buildContext: '$(Build.SourcesDirectory)/app'
        tags: |
          $(imageTag)
          latest

- stage: Deploy
  displayName: Deploy to AKS

  dependsOn: Build

  jobs:

  - job: Deploy

    displayName: Deploy Application

    steps:

    - checkout: self

    - task: AzureCLI@2
      displayName: Deploy to AKS
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |

          az aks get-credentials \
            --resource-group $(resourceGroup) \
            --name $(aksCluster) \
            --overwrite-existing

          sed -i "s/IMAGE_TAG/$(imageTag)/g" kubernetes/deployment.yaml

          kubectl apply -f kubernetes/service.yaml

          kubectl apply -f kubernetes/deployment.yaml

          kubectl rollout status deployment/enterprise-devops-lab \
            -n $(namespace)
