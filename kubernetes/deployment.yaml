apiVersion: apps/v1
kind: Deployment

metadata:
  name: enterprise-devops-lab
  namespace: petclinic

spec:
  replicas: 2

  selector:
    matchLabels:
      app: enterprise-devops-lab

  template:
    metadata:
      labels:
        app: enterprise-devops-lab

    spec:
      containers:
      - name: enterprise-devops-lab
        image: acrnmdevopslab01.azurecr.io/enterprise-devops-lab:IMAGE_TAG
        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080

          initialDelaySeconds: 15
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080

          initialDelaySeconds: 30
          periodSeconds: 20
